<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Secretaria de Transportes</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    color:#333;
}

/* MENU */
.menu{
    width:240px;
    background:linear-gradient(180deg,#1e2a38,#17202b);
    color:white;
    height:100vh;
    padding:20px;
}

.menu h2{
    font-size:20px;
    text-align:center;
    margin-bottom:20px;
}

.menu button{
    width:100%;
    margin-bottom:10px;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2f435a;
    color:white;
}

.menu button:hover{
    background:#3d5a78;
}

/* CONTEÚDO */
.content{
    flex:1;
    padding:25px;
}

/* CARD */
.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* INPUTS */
input, select{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* BOTÕES */
.add{
    background:#28a745;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.del{
    background:#dc3545;
    color:white;
    border:none;
    padding:5px 8px;
    border-radius:6px;
    cursor:pointer;
}

.edit{
    background:#007bff;
    color:white;
    border:none;
    padding:5px 8px;
    border-radius:6px;
    cursor:pointer;
}

.status-ok{ color:green; font-weight:bold; }
.status-manut{ color:red; font-weight:bold; }

.secao{ display:none; }
</style>
</head>

<div class="menu">
    <h2>Transportes</h2>
    <button onclick="mostrar('motoristas')">Motoristas</button>
    <button onclick="mostrar('veiculos')">Veículos</button>
    <button onclick="mostrar('pecas')">Peças</button>
    <button onclick="mostrar('combustivel')">Combustível</button>
</div>

<div class="content">

<!-- MOTORISTAS -->
<div id="motoristas" class="secao">
    <div class="card">
        <h3>Motoristas</h3>
        <input id="nomeMotorista" placeholder="Nome">
        <button class="add" onclick="addMotorista()">Adicionar</button>
    </div>
    <div id="listaMotoristas"></div>
</div>

<!-- VEÍCULOS -->
<div id="veiculos" class="secao">

    <div class="card">
        <h3>Veículos</h3>

        <input id="nomeVeiculo" placeholder="Nome">
        <input id="placaVeiculo" placeholder="Placa">

        <select id="secretariaVeiculo">
            <option value="">Secretaria</option>
            <option>Administração</option>
            <option>Agricultura</option>
            <option>Assistência Social</option>
            <option>Cultura</option>
            <option>Educação</option>
            <option>Gabinete</option>
            <option>Obras</option>
            <option>Saúde</option>
            <option>Conselho Tutelar</option>
        </select>

        <select id="statusVeiculo">
            <option value="">Situação</option>
            <option>Disponível</option>
            <option>Em manutenção</option>
        </select>

        <button class="add" onclick="addVeiculo()">Adicionar</button>
    </div>

    <!-- FILTROS VEÍCULOS -->
    <div class="card">
        <h3>Filtros</h3>

        <select id="filtroStatus" onchange="renderVeiculos()">
            <option>Todos</option>
            <option>Disponível</option>
            <option>Em manutenção</option>
        </select>

        <select id="filtroSecretaria" onchange="renderVeiculos()">
            <option>Todas</option>
            <option>Administração</option>
            <option>Agricultura</option>
            <option>Assistência Social</option>
            <option>Cultura</option>
            <option>Educação</option>
            <option>Gabinete</option>
            <option>Obras</option>
            <option>Saúde</option>
            <option>Conselho Tutelar</option>
        </select>
    </div>

    <div id="listaVeiculos"></div>
</div>

<!-- PEÇAS -->
<div id="pecas" class="secao">
    <div class="card">
        <h3>Peças</h3>
        <input id="nomePeca" placeholder="Nome peça">
        <button class="add" onclick="addPeca()">Adicionar</button>
    </div>
    <div id="listaPecas"></div>
</div>

<!-- COMBUSTÍVEL -->
<div id="combustivel" class="secao">

    <div class="card">
        <h3>Combustível</h3>

        <select id="filtroCombSecretaria" onchange="carregarFiltroVeiculos(); renderCombustivel()">
            <option value="todas">Todas secretarias</option>
        </select>

        <select id="veiculoComb"></select>

        <input type="date" id="dataComb">
        <input id="valorComb" placeholder="Valor">
        <input id="kmComb" placeholder="KM">

        <button class="add" onclick="addCombustivel()">Adicionar</button>
    </div>

    <div class="card">
        <h3>Filtro veículos</h3>
        <select id="filtroCombVeiculo" onchange="renderCombustivel()">
            <option value="todos">Todos</option>
        </select>
    </div>

    <div id="listaCombustivel"></div>
</div>

function salvar(){
    localStorage.setItem("motoristas", JSON.stringify(motoristas));
    localStorage.setItem("veiculos", JSON.stringify(veiculos));
    localStorage.setItem("pecas", JSON.stringify(pecas));
    localStorage.setItem("combustivel", JSON.stringify(combustivel));
}

// ===== NAVEGAÇÃO =====
function mostrar(secao){
    document.querySelectorAll(".secao").forEach(s=>s.style.display="none");
    document.getElementById(secao).style.display="block";
}

// ===== MOTORISTAS =====
function addMotorista(){
    let nome = nomeMotorista.value;
    if(!nome) return;

    motoristas.push({nome, veiculo:""});
    salvar();
    renderMotoristas();
    nomeMotorista.value="";
}

function renderMotoristas(){
    listaMotoristas.innerHTML = motoristas.map((m,i)=>`
        <div class="card">
            <b>${m.nome}</b><br>

            <select onchange="atualizarMotorista(${i}, this.value)">
                <option value="">Sem veículo</option>
                ${veiculos.map(v=>`
                    <option value="${v.placa}" ${m.veiculo===v.placa?"selected":""}>
                        ${v.nome} - ${v.placa}
                    </option>
                `).join("")}
            </select>

            <button class="del" onclick="delMotorista(${i})">X</button>
        </div>
    `).join("");
}

function atualizarMotorista(i,v){
    motoristas[i].veiculo=v;
    salvar();
    renderMotoristas();
}

function delMotorista(i){
    motoristas.splice(i,1);
    salvar();
    renderMotoristas();
}

// ===== VEÍCULOS =====
let edit=null;

function addVeiculo(){
    let v={
        nome:nomeVeiculo.value,
        placa:placaVeiculo.value,
        secretaria:secretariaVeiculo.value,
        status:statusVeiculo.value
    };

    if(!v.nome||!v.placa) return;

    if(edit===null) veiculos.push(v);
    else veiculos[edit]=v, edit=null;

    salvar();
    renderVeiculos();
}

function renderVeiculos(){
    let s1=filtroStatus.value;
    let s2=filtroSecretaria.value;

    listaVeiculos.innerHTML = veiculos
    .filter(v=>{
        return (s1==="Todos"||v.status===s1) &&
               (s2==="Todas"||v.secretaria===s2);
    })
    .map((v,i)=>`
        <div class="card">
            <b>${v.nome}</b><br>
            ${v.placa}<br>
            ${v.secretaria}<br>
            <span class="${v.status==="Disponível"?"status-ok":"status-manut"}">${v.status}</span><br>

            <button class="edit" onclick="editar(${i})">Editar</button>
            <button class="del" onclick="delVeiculo(${i})">X</button>
        </div>
    `).join("");
}

function editar(i){
    let v=veiculos[i];
    nomeVeiculo.value=v.nome;
    placaVeiculo.value=v.placa;
    secretariaVeiculo.value=v.secretaria;
    statusVeiculo.value=v.status;
    edit=i;
}

function delVeiculo(i){
    veiculos.splice(i,1);
    salvar();
    renderVeiculos();
}

// ===== PEÇAS =====
function addPeca(){
    if(!nomePeca.value) return;
    pecas.push(nomePeca.value);
    salvar();
    renderPecas();
}

function renderPecas(){
    listaPecas.innerHTML = pecas.map((p,i)=>`
        <div class="card">
            ${p}
            <button class="del" onclick="delPeca(${i})">X</button>
        </div>
    `).join("");
}

function delPeca(i){
    pecas.splice(i,1);
    salvar();
    renderPecas();
}

// ===== COMBUSTÍVEL =====
function addCombustivel(){
    combustivel.push({
        veiculo:veiculoComb.value,
        data:dataComb.value,
        valor:valorComb.value,
        km:kmComb.value
    });

    salvar();
    renderCombustivel();
}

function renderCombustivel(){
    listaCombustivel.innerHTML = combustivel.map(c=>{
        let v=veiculos.find(x=>x.placa===c.veiculo);

        return `
        <div class="card">
            ${v? v.nome+" - "+v.placa : c.veiculo}<br>
            ${c.data} | R$ ${c.valor} | KM ${c.km}
        </div>`;
    }).join("");
}

// ===== INICIAL =====

renderVeiculos();
renderPecas();
renderCombustivel();

if (!localStorage.getItem("importado")) {
    veiculos = veiculos.concat(novosVeiculos);
    localStorage.setItem("importado", "true");
    salvar();
}
renderVeiculos();
