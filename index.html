<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Secretaria de Transportes</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    color:#333;
}

/* MENU */
.menu{
    width:240px;
    background:linear-gradient(180deg,#1e2a38,#17202b);
    color:white;
    height:100vh;
    padding:20px;
}

.menu button{
    width:100%;
    margin-bottom:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2f435a;
    color:#fff;
}

/* CONTEÚDO */
.content{
    flex:1;
    padding:20px;
}

/* CARDS */
.card{
    background:#fff;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* INPUTS */
input, select{
    padding:8px;
    margin:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* BOTÕES */
button.add{background:#28a745;color:#fff;border:none;padding:8px;border-radius:6px}
button.del{background:#dc3545;color:#fff;border:none;padding:6px;border-radius:6px}
button.edit{background:#007bff;color:#fff;border:none;padding:6px;border-radius:6px}

/* STATUS */
.status-disponivel{color:green;font-weight:bold}
.status-manutencao{color:red;font-weight:bold}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
    <h2>Transportes</h2>
    <button onclick="mostrar('motoristas')">Motoristas</button>
    <button onclick="mostrar('veiculos')">Veículos</button>
    <button onclick="mostrar('pecas')">Peças</button>
    <button onclick="mostrar('combustivel')">Combustível</button>
</div>

<!-- CONTEÚDO -->
<div class="content">

<!-- MOTORISTAS -->
<div id="motoristas" class="secao">
    <div class="card">
        <h3>Motoristas</h3>
        <input id="nomeMotorista" placeholder="Nome">
        <button class="add" onclick="addMotorista()">Adicionar</button>
    </div>
    <div id="listaMotoristas"></div>
</div>

<!-- VEÍCULOS -->
<div id="veiculos" class="secao" style="display:none;">
    <div class="card">
        <h3>Veículos</h3>
        <input id="nomeVeiculo" placeholder="Nome">
        <input id="placaVeiculo" placeholder="Placa">

        <select id="secretariaVeiculo">
            <option value="">Secretaria</option>
            <option>Administração</option>
            <option>Agricultura</option>
            <option>Assistência Social</option>
            <option>Cultura</option>
            <option>Educação</option>
            <option>Gabinete</option>
            <option>Obras</option>
            <option>Saúde</option>
            <option>Conselho Tutelar</option>
        </select>

        <select id="statusVeiculo">
            <option value="">Situação</option>
            <option>Disponível</option>
            <option>Em manutenção</option>
        </select>

        <button class="add" onclick="addVeiculo()">Adicionar</button>
    </div>

    <div id="listaVeiculos"></div>
</div>

<!-- PEÇAS -->
<div id="pecas" class="secao" style="display:none;">
    <div class="card">
        <h3>Peças</h3>
        <input id="nomePeca" placeholder="Nome">
        <button class="add" onclick="addPeca()">Adicionar</button>
    </div>
    <div id="listaPecas"></div>
</div>

<!-- COMBUSTÍVEL -->
<div id="combustivel" class="secao" style="display:none;">

    <div class="card">
        <h3>Combustível</h3>

        <select id="filtroCombSecretaria" onchange="carregarFiltroVeiculos(); renderCombustivel()">
            <option value="todas">Todas secretarias</option>
            <option>Administração</option>
            <option>Agricultura</option>
            <option>Assistência Social</option>
            <option>Cultura</option>
            <option>Educação</option>
            <option>Gabinete</option>
            <option>Obras</option>
            <option>Saúde</option>
            <option>Conselho Tutelar</option>
        </select>

        <select id="veiculoComb"></select>

        <input id="dataComb" type="date">
        <input id="valorComb" placeholder="Valor">
        <input id="kmComb" placeholder="KM">

        <button class="add" onclick="addCombustivel()">Adicionar</button>
    </div>

    <div class="card">
        <h3>Filtros</h3>
        <select id="filtroCombVeiculo" onchange="renderCombustivel()"></select>
    </div>

    <div id="listaCombustivel"></div>
</div>

</div>

<script>

/* ===== NAVEGAÇÃO ===== */
function mostrar(secao){
    document.querySelectorAll(".secao").forEach(s=>s.style.display="none");
    document.getElementById(secao).style.display="block";
}

/* ===== STORAGE ===== */
let motoristas = JSON.parse(localStorage.getItem("motoristas")||"[]");
let veiculos = JSON.parse(localStorage.getItem("veiculos")||"[]");
let pecas = JSON.parse(localStorage.getItem("pecas")||"[]");
let combustivel = JSON.parse(localStorage.getItem("combustivel")||"[]");

function salvar(){
    localStorage.setItem("motoristas",JSON.stringify(motoristas));
    localStorage.setItem("veiculos",JSON.stringify(veiculos));
    localStorage.setItem("pecas",JSON.stringify(pecas));
    localStorage.setItem("combustivel",JSON.stringify(combustivel));
}

/* ===== MOTORISTAS ===== */
function addMotorista(){
    let nome=document.getElementById("nomeMotorista").value;
    if(!nome) return;
    motoristas.push({nome,veiculo:""});
    salvar(); renderMotoristas();
}

function renderMotoristas(){
    document.getElementById("listaMotoristas").innerHTML =
    motoristas.map((m,i)=>`
        <div class="card">
            <b>${m.nome}</b>
            <button class="del" onclick="motoristas.splice(${i},1);salvar();renderMotoristas()">X</button>
        </div>
    `).join("");
}

/* ===== VEÍCULOS ===== */
function addVeiculo(){
    let nome=document.getElementById("nomeVeiculo").value;
    let placa=document.getElementById("placaVeiculo").value;
    let secretaria=document.getElementById("secretariaVeiculo").value;
    let status=document.getElementById("statusVeiculo").value;

    if(!nome||!placa) return;

    veiculos.push({nome,placa,secretaria,status});
    salvar(); renderVeiculos(); carregarVeiculosComb();
}

function renderVeiculos(){
    document.getElementById("listaVeiculos").innerHTML =
    veiculos.map((v,i)=>`
        <div class="card">
            <b>${v.nome}</b><br>
            ${v.placa}<br>
            ${v.secretaria}<br>
            <span class="${v.status=='Disponível'?'status-disponivel':'status-manutencao'}">${v.status}</span>
        </div>
    `).join("");
}

/* ===== PEÇAS ===== */
function addPeca(){
    let nome=document.getElementById("nomePeca").value;
    if(!nome) return;
    pecas.push(nome);
    salvar(); renderPecas();
}

function renderPecas(){
    document.getElementById("listaPecas").innerHTML =
    pecas.map((p,i)=>`
        <div class="card">${p}</div>
    `).join("");
}

/* ===== COMBUSTÍVEL ===== */
function addCombustivel(){
    let veiculo=document.getElementById("veiculoComb").value;
    let data=document.getElementById("dataComb").value;
    let valor=document.getElementById("valorComb").value;
    let km=document.getElementById("kmComb").value;

    combustivel.push({veiculo,data,valor,km});
    salvar(); renderCombustivel();
}

function renderCombustivel(){
    document.getElementById("listaCombustivel").innerHTML =
    combustivel.map(c=>`
        <div class="card">
            ${c.veiculo} - ${c.data} - R$ ${c.valor} - KM ${c.km}
        </div>
    `).join("");
}

/* ===== VEÍCULOS NO SELECT ===== */
function carregarVeiculosComb(){
    let sel=document.getElementById("veiculoComb");
    let filtro=document.getElementById("filtroCombVeiculo");

    sel.innerHTML="";
    filtro.innerHTML="<option value='todos'>Todos</option>";

    veiculos.forEach(v=>{
        sel.innerHTML+=`<option value="${v.placa}">${v.nome}</option>`;
        filtro.innerHTML+=`<option value="${v.placa}">${v.nome}</option>`;
    });
}

renderMotoristas();
renderVeiculos();
renderPecas();
carregarVeiculosComb();
</script>

</body>
</html>
