<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Secretaria de Transportes</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    color:#333;
}

/* MENU LATERAL */
.menu{
    width:240px;
    background:linear-gradient(180deg,#1e2a38,#17202b);
    color:white;
    height:100vh;
    padding:20px;
    box-shadow:2px 0 10px rgba(0,0,0,0.2);
}

.menu h2{
    font-size:20px;
    margin-bottom:25px;
    text-align:center;
    letter-spacing:1px;
}

.menu button{
    width:100%;
    margin-bottom:12px;
    padding:12px;
    border:none;
    cursor:pointer;
    border-radius:8px;
    background:#2f435a;
    color:white;
    font-size:14px;
    transition:0.2s;
}

.menu button:hover{
    background:#3d5a78;
    transform:scale(1.03);
}

/* CONTEÚDO */
.content{
    flex:1;
    padding:25px;
}

/* CARDS */
.card{
    background:white;
    padding:18px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    margin-bottom:15px;
    transition:0.2s;
}

.card:hover{
    transform:translateY(-2px);
}

/* INPUTS */
input, select{
    padding:10px;
    margin:6px 5px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    width:180px;
}

input:focus, select:focus{
    border-color:#2f435a;
}

/* BOTÃO ADICIONAR */
button.add{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 14px;
    cursor:pointer;
    border-radius:8px;
    font-size:13px;
    min-width:120px;
    transition:0.2s;
}

button.add:hover{
    background:#218838;
    transform:scale(1.03);
}

/* BOTÃO EXCLUIR */
button.del{
    background:#dc3545;
    color:white;
    border:none;
    padding:6px 10px;
    cursor:pointer;
    border-radius:6px;
    font-size:12px;
    margin-left:8px;
    transition:0.2s;
}

button.del:hover{
    background:#c82333;
    transform:scale(1.05);
}

/* BOTÃO EDITAR */
button.edit{
    background:#007bff;
    color:white;
    border:none;
    padding:6px 10px;
    cursor:pointer;
    border-radius:6px;
    font-size:12px;
    margin-left:8px;
    transition:0.2s;
}

button.edit:hover{
    background:#0069d9;
    transform:scale(1.05);
}

/* LISTA */
.card b{
    font-size:16px;
}
.status-disponivel{
    color: #1e7e34;
    font-weight: bold;
}

.status-manutencao{
    color: #c82333;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="menu">
    <h2>Secretaria de Transportes</h2>
    <button onclick="mostrar('motoristas')">Motoristas</button>
    <button onclick="mostrar('veiculos')">Veículos</button>
    <button onclick="mostrar('pecas')">Peças</button>
</div>

<div class="content">

<!-- MOTORISTAS -->
<div id="motoristas" class="secao">
    <div class="card">
        <h3>Motoristas</h3>
        <input id="nomeMotorista" placeholder="Nome do motorista">
        <button class="add" onclick="addMotorista()">Adicionar</button>
    </div>
    <div id="listaMotoristas"></div>
</div>

<!-- VEICULOS -->
<div id="veiculos" class="secao" style="display:none;">
    <div class="card">
        <h3>Veículos</h3>

        <input id="nomeVeiculo" placeholder="Nome do veículo">
        <input id="placaVeiculo" placeholder="Placa">

<select id="secretariaVeiculo">
    <option value="">Secretaria</option>
    <option>Administração</option>
    <option>Agricultura</option>
    <option>Assistência Social</option>
    <option>Cultura</option>
    <option>Educação</option>
    <option>Gabinete</option>
    <option>Obras</option>
    <option>Saúde</option>
    <option>Conselho Tutelar</option>
</select>

        <select id="statusVeiculo">
            <option value="">Situação</option>
            <option>Disponível</option>
            <option>Em manutenção</option>
        </select>

        <button class="add" onclick="addVeiculo()">Adicionar</button>
    </div>
    <div class="card">
    <h3>Filtro de Veículos</h3>

    <select id="filtroStatus" onchange="renderVeiculos()">
        <option value="Todos">Todos os veículos</option>
        <option value="Disponível">Disponíveis</option>
        <option value="Em manutenção">Em manutenção</option>
    </select>

        <select id="filtroSecretaria" onchange="renderVeiculos()">
    <option value="Todas">Todas as secretarias</option>
    <option>Agricultura</option>
    <option>Administração</option>
    <option>Assistência Social</option>
    <option>Cultura</option>
    <option>Educação</option>
    <option>Gabinete</option>
    <option>Obras</option>
    <option>Saúde</option>
    <option>Conselho Tutelar</option>
</select>
</div>
    <div id="listaVeiculos"></div>
</div>

<!-- PECAS -->
<div id="pecas" class="secao" style="display:none;">
    <div class="card">
        <h3>Peças</h3>
        <input id="nomePeca" placeholder="Nome da peça">
        <button class="add" onclick="addPeca()">Adicionar</button>
    </div>
    <div id="listaPecas"></div>
</div>

</div>

    <script>

// ====== NAVEGAÇÃO ======
function mostrar(secao){
    document.querySelectorAll(".secao").forEach(s => s.style.display="none");
    document.getElementById(secao).style.display="block";
}

// ====== LOCALSTORAGE ======
let motoristas = JSON.parse(localStorage.getItem("motoristas") || "[]");
let veiculos = JSON.parse(localStorage.getItem("veiculos") || "[]");
let pecas = JSON.parse(localStorage.getItem("pecas") || "[]");

// ====== SALVAR ======
function salvar(){
    localStorage.setItem("motoristas", JSON.stringify(motoristas));
    localStorage.setItem("veiculos", JSON.stringify(veiculos));
    localStorage.setItem("pecas", JSON.stringify(pecas));
}

// ====== MOTORISTAS ======
function addMotorista(){
    let nome = document.getElementById("nomeMotorista").value;
    if(nome){
        motoristas.push(nome);
        salvar();
        renderMotoristas();
    }
}

function renderMotoristas(){
    let html = "";
    motoristas.forEach((m,i)=>{
        html += `<div class="card">${m}
        <button class="del" onclick="delMotorista(${i})">X</button></div>`;
    });
    document.getElementById("listaMotoristas").innerHTML = html;
}

function delMotorista(i){
    motoristas.splice(i,1);
    salvar();
    renderMotoristas();
}

// ====== VEICULOS ======
let editIndex = null;

function addVeiculo(){
    let nome = document.getElementById("nomeVeiculo").value;
    let placa = document.getElementById("placaVeiculo").value;
    let secretaria = document.getElementById("secretariaVeiculo").value;
    let status = document.getElementById("statusVeiculo").value;

    if(nome && placa && secretaria && status){

        let veiculo = { nome, placa, secretaria, status };

        if(editIndex === null){
            veiculos.push(veiculo);
        } else {
            veiculos[editIndex] = veiculo;
            editIndex = null;
        }

        salvar();
        renderVeiculos();

        // limpar campos
        document.getElementById("nomeVeiculo").value = "";
        document.getElementById("placaVeiculo").value = "";
        document.getElementById("secretariaVeiculo").value = "";
        document.getElementById("statusVeiculo").value = "";
    }
}
function renderVeiculos(){
    let filtroStatus = document.getElementById("filtroStatus")?.value || "Todos";
    let filtroSecretaria = document.getElementById("filtroSecretaria")?.value || "Todas";

    let html = "";

    veiculos.forEach((v,i)=>{

        // filtro status
        if(filtroStatus !== "Todos" && v.status !== filtroStatus){
            return;
        }

        // filtro secretaria
        if(filtroSecretaria !== "Todas" && v.secretaria !== filtroSecretaria){
            return;
        }

        html += `
        <div class="card">
            <b>${v.nome}</b><br>
            Placa: ${v.placa}<br>
            Secretaria: ${v.secretaria}<br>
            Situação: <span class="${v.status === 'Disponível' ? 'status-disponivel' : 'status-manutencao'}">${v.status}</span><br>

            <button class="edit" onclick="editarVeiculo(${i})">Editar</button>
            <button class="del" onclick="delVeiculo(${i})">X</button>
        </div>`;
    });

    document.getElementById("listaVeiculos").innerHTML = html;
}

function editarVeiculo(i){
    let v = veiculos[i];

    document.getElementById("nomeVeiculo").value = v.nome;
    document.getElementById("placaVeiculo").value = v.placa;
    document.getElementById("secretariaVeiculo").value = v.secretaria;
    document.getElementById("statusVeiculo").value = v.status;

    editIndex = i;
}

function delVeiculo(i){
    veiculos.splice(i,1);
    salvar();
    renderVeiculos();
}

// ====== PECAS ======
function addPeca(){
    let nome = document.getElementById("nomePeca").value;
    if(nome){
        pecas.push(nome);
        salvar();
        renderPecas();
    }
}

function renderPecas(){
    let html = "";
    pecas.forEach((p,i)=>{
        html += `<div class="card">${p}
        <button class="del" onclick="delPeca(${i})">X</button></div>`;
    });
    document.getElementById("listaPecas").innerHTML = html;
}

function delPeca(i){
    pecas.splice(i,1);
    salvar();
    renderPecas();
}

// ====== INICIALIZAÇÃO ======
renderMotoristas();
renderVeiculos();
renderPecas();

</script>
</body>
</html>
