<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secretaria de Transportes</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<h2>🚗 Transportes</h2>

<button onclick="mostrarTela('dashboard')">
🏠 Dashboard
</button>

<button onclick="mostrarTela('veiculos')">
🚙 Veículos
</button>

<button onclick="mostrarTela('novoVeiculo')">
➕ Adicionar Veículo
</button>

<button onclick="mostrarTela('motoristas')">
👨 Motoristas
</button>

<button onclick="mostrarTela('combustivel')">
⛽ Combustível
</button>

<button onclick="mostrarTela('manutencao')">
🔧 Manutenção
</button>

<button onclick="mostrarTela('agenda')">
📅 Agenda
</button>

</div>

<div class="conteudo">

<!-- DASHBOARD -->

<div id="dashboard" class="tela">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">

<h3>Total de Veículos</h3>

<h2 id="totalVeiculos">0</h2>

</div>

<div class="card">

<h3>Motoristas</h3>

<h2>0</h2>

</div>

<div class="card">

<h3>Manutenções</h3>

<h2>0</h2>

</div>

<div class="card">

<h3>Combustível</h3>

<h2>R$ 0,00</h2>

</div>

</div>

</div>

<!-- VEICULOS -->

<div id="veiculos" class="tela esconder">

<h1>Veículos</h1>

<input
type="text"
id="pesquisa"
placeholder="Pesquisar veículo..."
onkeyup="pesquisarVeiculo()">

<table>

<thead>

<tr>

<th>Placa</th>
<th>Modelo</th>
<th>Ano</th>
<th>KM</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="listaVeiculos">

</tbody>

</table>

</div>

<!-- NOVO VEICULO -->

<div id="novoVeiculo" class="tela esconder">

<h1>Novo Veículo</h1>

<div class="formulario">

<input id="placa" placeholder="Placa">

<input id="modelo" placeholder="Modelo">

<input id="marca" placeholder="Marca">

<input id="ano" placeholder="Ano">

<input id="cor" placeholder="Cor">

<input id="km" placeholder="Quilometragem">

<button onclick="salvarVeiculo()">

Salvar Veículo

</button>

</div>

</div>

<!-- MOTORISTAS -->

<div id="motoristas" class="tela esconder">

<h1>Motoristas</h1>

<p>Em desenvolvimento...</p>

</div>

<!-- COMBUSTIVEL -->

<div id="combustivel" class="tela esconder">

<h1>Combustível</h1>

<p>Em desenvolvimento...</p>

</div>

<!-- MANUTENÇÃO -->

<div id="manutencao" class="tela esconder">

<h1>Manutenção</h1>

<p>Em desenvolvimento...</p>

</div>

<!-- AGENDA -->

<div id="agenda" class="tela esconder">

<h1>Agenda</h1>

<p>Em desenvolvimento...</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
